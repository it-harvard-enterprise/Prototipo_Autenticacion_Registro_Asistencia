# Supabase Local Development Configuration
# https://supabase.com/docs/guides/cli/local-development

# Uncomment and set the following to enable Mailpit for local email testing
[auth]
# Email provider configuration for Mailpit (local SMTP)
# Mailpit is a local email testing server that captures emails sent by your application
# Install Mailpit from: https://mailpit.axllent.org/
# Run: mailpit (or mailpit.exe on Windows)
# Access UI at: http://localhost:8025

enabled = true
email_auto_confirm = false
smtp_admin_email = "admin@example.com"
smtp_sender_name = "Escuela de Idiomas"
smtp_host = "localhost"
smtp_port = 1025
smtp_user = ""
smtp_pass = ""
smtp_max_frequency = 0
smtp_max_frequency_wait = 0

# The following email templates can be customized in the dashboard
# - Confirm signup
# - Invite user
# - Magic link
# - Change email
# - Reset password
# - Re-authenticate

[analytics]
enabled = false

[db]
# The database major version to use
# This has to be defined before initializing the DB
major_version = 15

[realtime]
enabled = true
max_concurrent_connections = 1000
max_message_payload_bytes = 200000
timeout_sec = 3600
ssl_enforce = false

[storage]
enabled = true
file_size_limit = 52428800
s3_host = "localhost"
s3_port = 54321
s3_protocol = "http"
s3_access_key = "625729a08b95740f665db339d36b8c7c"
s3_secret_key = "850181e4652dd023b7a98c58ae63165625429f24869d001cca0acb6d731e97db"
s3_region = "local"
s3_bucket = "local"

[auth.email]
enable_signup = true
enable_confirmations = false
